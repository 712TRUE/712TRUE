  <style>
    @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap');

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #b8b8b8;
      font-family: 'Atkinson Hyperlegible', sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100%;
      text-align: center;
      position: relative;
      padding: 20px;
      box-sizing: border-box;
    }

    .main-text {
      font-size: 5rem;
      font-weight: 700;
      color: #2b2192;
      margin-bottom: 10px;
      display: block;
    }

    .preorder-label {
      font-size: 1.4rem;
      font-weight: 700;
      color: #2b2192;
      letter-spacing: 0.15em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .free-text {
      font-size: 6rem;
      font-weight: 700;
      color: #c4fc07;
      -webkit-text-stroke: 3px #2b2192;
      line-height: 1;
      margin-bottom: 14px;
      letter-spacing: -2px;
    }

    .center-image {
      max-width: 500px;
      width: 100%;
      height: auto;
      margin-bottom: 10px;
      border: none;
    }

    .product-info {
      font-size: 1rem;
      font-weight: 700;
      color: #2b2192;
      margin-bottom: 25px;
      letter-spacing: 0.05em;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 100%;
      max-width: 450px;
    }

    .form-row {
      display: flex;
      gap: 15px;
    }

    input[type="text"] {
      background: transparent;
      border: 3px solid #2b2192;
      color: #2b2192;
      padding: 15px;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 1.1rem;
      font-weight: bold;
      outline: none;
      width: 100%;
      box-sizing: border-box;
    }

    ::placeholder {
      color: #2b2192;
      opacity: 0.6;
    }

    /* Slideshow */
    .slideshow {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 500px;
      margin-bottom: 10px;
    }

    .slide-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      color: #2b2192;
      border: 2.5px solid #2b2192;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      transition: background 0.15s, color 0.15s;
    }

    .slide-btn:hover {
      background: #2b2192;
      color: #c4fc07;
    }

    .slide-btn.prev { left: 0; }
    .slide-btn.next { right: 0; }

    .slide-dots {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border: 2px solid #2b2192;
      background: transparent;
      cursor: pointer;
      transition: background 0.15s;
    }

    .dot.active {
      background: #2b2192;
    }

    /* Size selector */
    .size-container {
      width: 100%;
      text-align: left;
      color: #2b2192;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 5px 0;
    }

    .size-options {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .size-options input[type="radio"] {
      display: none;
    }

    .size-options label {
      flex: 1;
      text-align: center;
      padding: 12px 6px;
      border: 3px solid #2b2192;
      color: #2b2192;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s ease;
      box-sizing: border-box;
    }

    .size-options input[type="radio"]:checked + label {
      background-color: #2b2192;
      color: #c4fc07;
    }

    .size-options label:hover {
      background-color: #2b219222;
    }

    /* Slider */
    .slider-container {
      width: 100%;
      text-align: left;
      color: #2b2192;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 5px 0;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
      margin-top: 10px;
      border: none;
      padding: 0;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 25px;
      width: 25px;
      background: #c4fc07;
      border: 3px solid #2b2192;
      cursor: pointer;
      margin-top: -10px;
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 5px;
      cursor: pointer;
      background: #2b2192;
    }

    input[type=range]::-moz-range-thumb {
      height: 25px;
      width: 25px;
      background: #c4fc07;
      border: 3px solid #2b2192;
      cursor: pointer;
    }

    input[type=range]::-moz-range-track {
      width: 100%;
      height: 5px;
      cursor: pointer;
      background: #2b2192;
    }

    button {
      background-color: #2b2192;
      color: #c4fc07;
      border: 3px solid #2b2192;
      padding: 15px;
      font-size: 1.5rem;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 60px;
      transition: all 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      background-color: #c4fc07;
      color: #2b2192;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      color: #c4fc07;
      font-weight: 700;
      letter-spacing: -1px;
    }

    @media (max-width: 600px) {
      .main-text { font-size: 3rem; }
      .free-text { font-size: 4rem; }
      .form-row { flex-direction: column; gap: 15px; }
      .center-image { max-width: 500px; }
    }
  </style>

<body>
  <div class="container">

    <div class="main-text">trueX.000</div>

    <div class="slideshow">
      <button class="slide-btn prev" onclick="changeSlide(-1)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="12,2 5,9 12,16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <img id="slideImg" src="Tee.png" alt="Image" class="center-image">
      <button class="slide-btn next" onclick="changeSlide(1)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polyline points="6,2 13,9 6,16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="slide-dots">
        <span class="dot active" onclick="goToSlide(0)"></span>
        <span class="dot" onclick="goToSlide(1)"></span>
        <span class="dot" onclick="goToSlide(2)"></span>
      </div>
    </div>

    <div class="preorder-label">— PREORDER —</div>
    <div class="free-text">FREE</div>

    <form action="https://formsubmit.co/rastotuzincin123@gmail.com" method="POST">

        <input type="text" name="_honey" style="display:none">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="New Order Received!">

        <input type="text" name="full_name" placeholder="NAME" required>
        <input type="text" name="street_address" placeholder="ADDRESS" required>

        <div class="form-row">
            <input type="text" name="city" placeholder="CITY" required>
            <input type="text" name="zip_code" placeholder="ZIP CODE" required>
        </div>

        <input type="text" name="state_province" placeholder="COUNTRY" required>
        <input type="text" name="phone_number" placeholder="PHONE NUMBER" required>
        <input type="text" name="email" placeholder="E-MAIL" required>

        <div class="size-container">
          SIZE:
          <div class="size-options">
            <input type="radio" name="size" id="sizeXS" value="XS" required>
            <label for="sizeXS">XS</label>

            <input type="radio" name="size" id="sizeS" value="S">
            <label for="sizeS">S</label>

            <input type="radio" name="size" id="sizeM" value="M">
            <label for="sizeM">M</label>

            <input type="radio" name="size" id="sizeL" value="L">
            <label for="sizeL">L</label>

            <input type="radio" name="size" id="sizeXL" value="XL">
            <label for="sizeXL">XL</label>
          </div>
        </div>

        <button type="submit">SUBMIT</button>
    </form>

    <div class="footer">2026</div>
  </div>
  <script>
    const slides = ['Tee.png', 'Tee2.png', 'Tee3.png'];
    let current = 0;

    function updateSlide() {
      document.getElementById('slideImg').src = slides[current];
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    function changeSlide(dir) {
      current = (current + dir + slides.length) % slides.length;
      updateSlide();
    }

    function goToSlide(i) {
      current = i;
      updateSlide();
    }
  </script>
</body>
